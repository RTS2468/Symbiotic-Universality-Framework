id:
  alias: AlignedLimitEquivalence
  mnemo: RI-HC01-C80-F05-EG05-B-O-RV-PHI
  checksum: '144748'
definition: 'Light, Good, Truth, and Actualized are verdict-preserving labels for
  the same aligned limit: comparative Right within caps, honest/calibrated evidence,
  low bias/opacity, and reversible preference; Good* occurs when expected harm is
  effectively zero and gates pass.'
uf_mapping:
  equations:
  - RI = max(H(baseline) - H(action), 0) / max(H(baseline), eps)
  - A = R/(R + D + delta)
  gates:
  - HC(stakes)
  - Consent(C>=0.80)
  - Fairness(KL<=0.05)
  - EvidenceGap(KL<=0.05)
  - Bias
  - Opacity
  - Reversibility
inputs:
- action
- baseline
- stakes
- evidence
outputs:
- verdict
- metrics
caps:
- HC01 for high stakes; med=5x; low=10x
- Fairness KL<=0.05
- Evidence-gap KL<=0.05
- Bias<=cap
- Opacity<=cap
invariants_preserved:
- Determinism
- Auditability
- ComparativeRight
- ObserverInvariance
- Endpoints
- NoPerfectionTraps
- PhiMonotonicity
examples:
- Light/Good/Truth/Actualized produce identical verdicts when bound to the same mnemocode
  and caps.
status: accepted
version: '1.0'
