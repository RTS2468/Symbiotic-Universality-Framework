<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900">
  <rect width="100%" height="100%" fill="#0b1220"/>
  <defs>
    <style type="text/css"><![CDATA[
      .title { fill: #e6f1ff; font: bold 28px sans-serif; }
      .label { fill: #cfe3ff; font: 18px sans-serif; }
      .node { fill: #102a43; stroke: #83c5ff; stroke-width: 2; rx: 14; }
      .edge { stroke: #83c5ff; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#83c5ff"/>
    </marker>
  </defs>

  <text x="40" y="60" class="title">Distributed Holographic Ledger — Architecture</text>

  <!-- Nodes -->
  <rect x="80" y="120" width="360" height="120" class="node"/>
  <text x="100" y="160" class="label">Node A</text>
  <text x="100" y="190" class="label">• Emits entries</text>

  <rect x="520" y="120" width="360" height="120" class="node"/>
  <text x="540" y="160" class="label">Node B</text>
  <text x="540" y="190" class="label">• Verifies & signs</text>

  <rect x="960" y="120" width="360" height="120" class="node"/>
  <text x="980" y="160" class="label">Node C</text>
  <text x="980" y="190" class="label">• Observes & checkpoints</text>

  <!-- Edges -->
  <path d="M 440 180 C 470 180, 500 180, 520 180" class="edge"/>
  <path d="M 880 180 C 910 180, 940 180, 960 180" class="edge"/>

  <!-- Entry types -->
  <rect x="80" y="300" width="1240" height="120" class="node"/>
  <text x="100" y="340" class="label">Entry Types</text>
  <text x="100" y="370" class="label">INIT, SPEC_CREATE, SPEC_UPDATE, RENDER_PLAN, PREVIEW, FINAL_ASSET, DECISION, CHECKPOINT, ALERT, HALT</text>

  <!-- Braid anchor / Merkle -->
  <rect x="80" y="460" width="1240" height="140" class="node"/>
  <text x="100" y="500" class="label">Braid Anchors (Merkle-DAG)</text>
  <text x="100" y="530" class="label">• Merge concurrent branches</text>
  <text x="100" y="560" class="label">• Provide proofs of inclusion</text>

  <!-- Policies -->
  <rect x="80" y="630" width="1240" height="120" class="node"/>
  <text x="100" y="670" class="label">Policies & Thresholds</text>
  <text x="100" y="700" class="label">• Green/Amber/Red disclosure; halt on dissonance ≥ 0.98 or axiom conflicts</text>
</svg>
